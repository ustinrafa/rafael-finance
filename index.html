<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rafael's Finance - Kelola Keuangan Keluarga</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f3; min-height: 100vh; color: #1a1a1a; }
  .screen { display: none; }
  .screen.active { display: flex; }
  .login-wrap { min-height: 100vh; width: 100%; align-items: center; justify-content: center; background: #f5f5f3; }
  .login-card { background: #fff; border: 0.5px solid #e0e0d8; border-radius: 12px; padding: 2rem; width: 340px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
  .app { min-height: 100vh; width: 100%; }
  .sidebar { background: #fff; border-right: 0.5px solid #e0e0d8; width: 220px; padding: 1.25rem 1rem; display: flex; flex-direction: column; gap: 4px; position: fixed; height: 100vh; }
  .main { margin-left: 220px; padding: 1.75rem 2rem; }
  .nav-item { padding: 8px 10px; border-radius: 8px; cursor: pointer; color: #666; display:flex; align-items:center; gap:8px; }
  .nav-item.active { background: #e6f1fb; color: #185FA5; font-weight: 500; }
  .card { background: #fff; border: 0.5px solid #e0e0d8; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .content-section { display: none; }
  .content-section.active { display: block; }
  .bar-item { margin-bottom: 15px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .bar-track { background: #eee; height: 8px; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; }
  .full-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .full-table th, .full-table td { padding: 12px; border-bottom: 0.5px solid #e0e0d8; }
</style>
</head>
<body>

<div id="loginScreen" class="screen active login-wrap">
  <div class="login-card">
    <div style="font-weight:600; margin-bottom:1rem;">Rafael's Finance</div>
    <input type="text" id="username" placeholder="Username" style="width:100%; padding:8px; margin-bottom:10px;">
    <input type="password" id="password" placeholder="Password" style="width:100%; padding:8px; margin-bottom:10px;">
    <button onclick="doLogin()" style="width:100%; padding:10px; background:#185FA5; color:#fff; border:none; border-radius:8px;">Masuk</button>
  </div>
</div>

<div id="dashScreen" class="screen app">
  <div class="sidebar">
    <div style="font-weight:600; margin-bottom:1rem;">Rafael's Finance</div>
    <div class="nav-item active" onclick="switchTab('dashboard', this)"><i class="ti ti-layout-dashboard"></i> Dashboard</div>
    <div class="nav-item" onclick="switchTab('tabungan', this)"><i class="ti ti-target"></i> Tabungan</div>
    <div class="nav-item" onclick="switchTab('transaksi', this)"><i class="ti ti-arrows-exchange"></i> Transaksi</div>
    <div onclick="location.reload()" style="padding:10px; margin-top:auto; cursor:pointer;"><i class="ti ti-logout"></i> Keluar</div>
  </div>

  <div class="main">
    <div id="tab-dashboard" class="content-section active">
      <div class="card"><canvas id="financeChart"></canvas></div>
    </div>

    <div id="tab-tabungan" class="content-section">
      <div class="card">
        <div style="font-weight:600; margin-bottom:1rem;">Target Tabungan</div>
        <div class="bar-item">
          <div class="bar-label"><span>Dana Darurat</span><span>Rp 10jt / Rp 100jt</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:10%; background:#185FA5;"></div></div>
        </div>
        <div class="bar-item">
          <div class="bar-label"><span>Tabunganku BCA</span><span>Rp 5jt / Rp 100jt</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:5%; background:#185FA5;"></div></div>
        </div>
        <div class="bar-item">
          <div class="bar-label"><span>Tabung Emas Tring!</span><span>Rp 530rb / Rp 100jt</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:0.5%; background:#D4AF37;"></div></div>
        </div>
      </div>
      <div class="card">
        <div style="font-weight:600; margin-bottom:1rem;">Performa Emas (1 Bulan vs 1 Tahun)</div>
        <canvas id="goldChart" height="100"></canvas>
      </div>
    </div>

    <div id="tab-transaksi" class="content-section">
      <div class="card">
        <table class="full-table">
          <tbody id="full-txn-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  function doLogin() {
    if (document.getElementById('username').value === 'rafael' && document.getElementById('password').value === '231420') {
      document.getElementById('loginScreen').classList.remove('active');
      document.getElementById('dashScreen').classList.add('active');
      initCharts();
    }
  }

  function switchTab(tabId, el) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.getElementById('tab-' + tabId).classList.add('active');
  }

  function initCharts() {
    const ctx1 = document.getElementById('financeChart').getContext('2d');
    new Chart(ctx1, { type: 'line', data: { labels: ['2023', '2024', '2025', '2026'], datasets: [{ label: 'Pemasukan', data: [42000000, 106000000, 104000000, 56000000], borderColor: '#185FA5' }] } });

    const ctx2 = document.getElementById('goldChart').getContext('2d');
    new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: ['1 Bulan Terakhir', '1 Tahun Terakhir'],
        datasets: [{ label: 'Kenaikan (%)', data: [2, 12], backgroundColor: ['#D4AF37', '#B8860B'] }]
      }
    });
  }
</script>
</body>
</html>
